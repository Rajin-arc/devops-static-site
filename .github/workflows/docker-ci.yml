name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          timeout: 30
          script: |
            echo " Connected to VM successfully"

            # Go to home directory
            cd ~

            # Clone repo if not exists
            if [ ! -d devops-static-site ]; then
              git clone https://github.com/Rajin-arc/devops-static-site.git
            fi

            # Pull latest changes
            cd devops-static-site
            git pull origin main

            # Build Docker image
            docker build -t static-site .

            # Stop and remove old container (if exists)
            docker rm -f website || true

            # Run new container
            docker run -d -p 80:80 --name website static-site

            echo " Deployment successful"
